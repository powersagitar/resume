name: Build LaTeX document (main)

on:
  push:
    tags:
      - "v**"

jobs:
  build_latex:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          post_compile: |
            mv 'main.pdf' 'Resume_Mohan_Dong_${{ github.ref_name }}.pdf'

      - name: Upload PDF file
        uses: actions/upload-artifact@v4
        with:
          name: Resume
          path: Resume_Mohan_Dong_${{ github.ref_name }}.pdf

      - name: Publish release
        run: |
          if [ "${{ github.event.base_ref }}" = "refs/heads/main" ]; then
            cp "Resume_Mohan_Dong_$GITHUB_REF_NAME.pdf" "Mohan_Dong_Resume.pdf"
            gh release create $GITHUB_REF_NAME "Mohan_Dong_Resume.pdf" --title "Resume $GITHUB_REF_NAME" --notes "Built on $(date)" --latest
          else
            gh release create $GITHUB_REF_NAME "Resume_Mohan_Dong_$GITHUB_REF_NAME.pdf" --title "Resume $GITHUB_REF_NAME" --notes "Built on $(date)" --latest=false
          fi
        env:
          GH_TOKEN: ${{ github.token }}
